            padding: 0;

            background: url("https://files.catbox.moe/3v104v.png") center/cover no-repeat fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: #d1a12c;
        }

        /* Wrapper Utama */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Container Utama Kartu */
        .card-container {
            width: 600px;
            height: 600px;
            background: 
                linear-gradient(rgba(10, 8, 3, 0.301), rgba(0, 0, 0, 0.0)),
                url("https://files.catbox.moe/euifpj.png") center/cover no-repeat;
            border: 7px solid #816d47fd;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.233), 0 15px 35px rgba(0,0,0,0.8), 0 0 15px rgba(209, 161, 44, 0.3);
            position: relative;
            padding: 35px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BAGIAN LOGO YANG DIPERBAIKI */
        .logo-image {
            max-width: 220px;
            height: auto;
            margin-bottom: 5px;
            /* Menambah kecerahan, kontras, dan ketajaman */
            filter: brightness(1.4) contrast(1.2) drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
            image-rendering: -webkit-optimize-contrast;
        }

        .date {
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 5px;
            margin-top: 6px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 0%, #fff3b3 40%, #dabf2b 80%, #d1a12c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.5)) drop-shadow(0 1px 3px rgba(0, 0, 0, 0.9));
        }

        .pasaran-badge-container {
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 5px;
            margin-bottom: 2px;
            width: 100%;
            height: 75px;
        }

        .pasaran-logo {
            max-height: 70px;
            max-width: 240px;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 3px 10px rgba(0, 0, 0, 0.6));
        }

        .sub-badge {
            font-size: 0.6rem;
            letter-spacing: 2.5px;
            color: #e5c158;
            margin-top: 0px;
            font-weight: 600;
        }

        /* --- CONTENT --- */
        .content-container {
            display: table;
            width: 100%;
            table-layout: fixed;
            margin-top: 5px;
            z-index: 2;
        }

        .content-column {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
        }

        .column-left { width: 25%; }
        .column-center { width: 50%; }
        .column-right { width: 25%; }

        .compass-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto;
        }

        .wind-rose-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .compass-number {
            position: absolute;
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff3b3;
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.9);
        }

        .cn-top { top: -20px; left: 50%; transform: translateX(-50%); }
        .cn-bottom { bottom: -25px; left: 50%; transform: translateX(-50%); }
        .cn-left { left: -16px; top: 50%; transform: translateY(-50%); } 
        .cn-right { right: -16px; top: 50%; transform: translateY(-50%); }

        .dragon-vector-small {
            width: 100px;
            height: 50px;
            margin: 30px auto 0 auto;
            opacity: 0.9;
            object-fit: contain;
            display: block;
        }

       .shio-wrapper{

            0% { box-shadow: 0 0 5px #000000, 0 0 10px #050505, inset 0 0 5px rgba(255,215,0,0.2); }

            100% { box-shadow: 0 0 5px #000000, 0 0 10px #000000, inset 0 0 5px rgba(32, 32, 28, 0.2); }

            document.getElementById('num-top').innerText = Math.floor(Math.random() * 10);
            document.getElementById('num-left').innerText = Math.floor(Math.random() * 10);
            document.getElementById('num-right').innerText = Math.floor(Math.random() * 10);
            document.getElementById('num-bottom').innerText = Math.floor(Math.random() * 10);
            document.getElementById('shio-num').innerText = Math.floor(Math.random() * 90) + 10;
            const shioAcak = daftarShio[Math.floor(Math.random() * daftarShio.length)];
            document.getElementById('shio-text').innerText = `SHIO ${shioAcak}`;
            document.getElementById('shio-logo-main').src = gambarShioUtamaMap[shioAcak];
            document.getElementById('shio-head-small').src = gambarShioKecilMap[shioAcak];
            let digitBBFS = [];
            while(digitBBFS.length < 8) {
                let r = Math.floor(Math.random() * 10);
                if(!digitBBFS.includes(r)) digitBBFS.push(r);
            }
            document.getElementById('bbfs-num').innerText = digitBBFS.join('');
            let digitMain = [...digitBBFS].sort(() => 0.5 - Math.random()).slice(0, 5);
            document.getElementById('main-num').innerText = digitMain.join(' - ');
            const syairTerpilih = daftarSyair[Math.floor(Math.random() * daftarSyair.length)];
            document.getElementById('poem-container').innerHTML = syairTerpilih.map(baris => `<p class="poem">${baris}</p>`).join('');
        }

        // Menjalankan fungsi saat halaman dibuka
        window.onload = function() {
            updateTanggalOtomatis();
        };
    </script>
</body>
</html>
